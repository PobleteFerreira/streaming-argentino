<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa del Streaming Argentino</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0c0f14;--surface:#141820;--border:#1e2530;--text:#e8ecf0;
    --muted:#6b7a8d;--accent:#f0c040;--nativo:#4fc8a0;--trad:#f07050;--otros:#8899cc;
    --ff:'Syne',sans-serif;--fm:'DM Mono',monospace;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--ff);overflow:hidden}
  #header{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px}
  #header h1{font-size:15px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
  #header h1 span{color:var(--accent)}
  #header .meta{font-family:var(--fm);font-size:11px;color:var(--muted)}
  #map{position:fixed;top:56px;left:0;right:320px;bottom:0;background:#0a0d11}
  #panel{position:fixed;top:56px;right:0;width:320px;bottom:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .psec{padding:16px 20px;border-bottom:1px solid var(--border)}
  .slabel{font-family:var(--fm);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .stat-card{background:var(--bg);border:1px solid var(--border);padding:10px 12px;border-radius:4px}
  .stat-card .num{font-size:20px;font-weight:800;color:var(--accent)}
  .stat-card .lbl{font-size:10px;font-family:var(--fm);color:var(--muted);margin-top:3px}
  .legend-items{display:flex;flex-direction:column;gap:6px}
  .legend-item{display:flex;align-items:center;gap:10px;cursor:pointer;padding:5px 8px;border-radius:4px;border:1px solid transparent;transition:all .15s}
  .legend-item:hover{background:var(--bg);border-color:var(--border)}
  .legend-item.inactive{opacity:.3}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .legend-item .lname{font-size:12px;font-weight:600;flex:1}
  .legend-item .count{font-family:var(--fm);font-size:11px;color:var(--muted)}
  .filter-group{display:flex;flex-direction:column;gap:6px}
  select,input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;font-family:var(--fm);font-size:12px;border-radius:3px;outline:none;transition:border-color .15s}
  select:focus,input[type=text]:focus{border-color:var(--accent)}
  select option{background:var(--surface)}
  .btn{background:none;border:1px solid var(--border);color:var(--muted);padding:7px 12px;font-family:var(--fm);font-size:11px;border-radius:3px;cursor:pointer;transition:all .15s;width:100%}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  #detail{flex:1;overflow-y:auto}
  #detail-ph{padding:24px 20px;font-family:var(--fm);font-size:11px;color:var(--muted);line-height:1.7;text-align:center;margin-top:20px}
  #ch-card{padding:20px;display:none}
  #ch-card .ch-name{font-size:15px;font-weight:800;line-height:1.3;margin-bottom:10px}
  .ch-badge{display:inline-block;padding:3px 8px;border-radius:2px;font-family:var(--fm);font-size:10px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px}
  .meta-list{display:flex;flex-direction:column;gap:7px}
  .meta-row{display:flex;gap:10px;align-items:baseline}
  .meta-key{font-family:var(--fm);font-size:10px;color:var(--muted);text-transform:uppercase;flex-shrink:0;width:88px}
  .meta-val{font-size:12px;font-weight:600}
  .ch-notes{margin-top:12px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:3px;font-family:var(--fm);font-size:11px;color:var(--muted);line-height:1.6}
  .leaflet-container{background:#0a0d11!important}
  .leaflet-tile{filter:brightness(.4) saturate(.25) hue-rotate(200deg)}
  .leaflet-control-zoom{border:1px solid var(--border)!important}
  .leaflet-control-zoom a{background:var(--surface)!important;color:var(--text)!important;border-color:var(--border)!important}
  .leaflet-control-attribution{display:none}
  .leaflet-popup-content-wrapper{background:var(--surface)!important;border:1px solid var(--border)!important;border-radius:4px!important;box-shadow:0 8px 24px rgba(0,0,0,.6)!important;color:var(--text)!important}
  .leaflet-popup-tip{background:var(--surface)!important}
  .leaflet-popup-content{margin:12px 14px!important;min-width:150px}
  .popup-title{font-size:13px;font-weight:700;margin-bottom:4px}
  .popup-sub{font-family:var(--fm);font-size:10px;color:var(--muted)}
  #loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
  #loading .ld-title{font-size:14px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
  #loading .ld-sub{font-family:var(--fm);font-size:11px;color:var(--muted);text-align:center;line-height:1.6;max-width:280px}
  #loading .ld-bar{width:180px;height:2px;background:var(--border);margin-top:20px;overflow:hidden;border-radius:1px}
  #loading .ld-fill{height:100%;background:var(--accent);animation:ldanim 1.4s ease-in-out infinite}
  @keyframes ldanim{0%{transform:translateX(-100%)}100%{transform:translateX(220%)}}
  #file-drop{border:1px dashed var(--border);border-radius:6px;padding:16px;text-align:center;cursor:pointer;transition:border-color .2s;margin-top:12px}
  #file-drop:hover{border-color:var(--accent)}
  #file-drop label{cursor:pointer;font-family:var(--fm);font-size:11px;color:var(--muted)}
  #file-drop label span{color:var(--accent)}
  #file-input{display:none}
  .indet-item{padding:6px 8px;border-radius:3px;border:1px solid transparent;cursor:pointer;margin-bottom:3px;transition:all .12s}
  .indet-item:hover{background:var(--bg);border-color:var(--border)}
  .cli-name{font-size:12px;font-weight:600}
  .cli-sub{font-family:var(--fm);font-size:10px;color:var(--muted)}
  .indet-count{display:inline-block;background:var(--border);color:var(--muted);font-family:var(--fm);font-size:10px;padding:1px 6px;border-radius:2px;margin-left:6px}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div id="loading">
  <div class="ld-title">Streaming Argentino</div>
  <div class="ld-sub" id="ld-msg">Buscando canales.csv...</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<div id="header">
  <h1>Mapa del <span>Streaming Argentino</span></h1>
  <div class="meta" id="header-meta">YouTube · Argentina</div>
</div>

<div id="map"></div>

<div id="panel">
  <div class="psec">
    <div class="slabel">Dataset</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="num" id="st-total">—</div><div class="lbl">canales</div></div>
      <div class="stat-card"><div class="num" id="st-prov">—</div><div class="lbl">provincias</div></div>
      <div class="stat-card"><div class="num" id="st-nat">—</div><div class="lbl">nativos digitales</div></div>
      <div class="stat-card"><div class="num" id="st-vis">—</div><div class="lbl">visibles</div></div>
    </div>
  </div>
  <div class="psec">
    <div class="slabel">Tipo de medio</div>
    <div class="legend-items" id="legend"></div>
  </div>
  <div class="psec">
    <div class="slabel">Filtros</div>
    <div class="filter-group">
      <select id="f-prov"><option value="">Todas las provincias</option></select>
      <select id="f-cat"><option value="">Todas las categorías</option></select>
      <input type="text" id="f-search" placeholder="Buscar canal...">
      <button class="btn" id="btn-reset">Limpiar filtros</button>
    </div>
  </div>
  <div id="detail">
    <div id="detail-ph">← Hacé clic en un punto<br>para ver los datos del canal</div>
    <div id="ch-card"></div>
  </div>
  <div class="psec" style="flex-shrink:0">
    <div class="slabel">Ubicación indeterminada <span class="indet-count" id="indet-count">0</span></div>
    <div id="indet-list" style="max-height:140px;overflow-y:auto"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
const COORDS={
  "Buenos Aires":[-36.6769,-60.5588],"CABA":[-34.6037,-58.3816],
  "Ciudad Autónoma de Buenos Aires":[-34.6037,-58.3816],
  "Catamarca":[-28.4696,-65.7795],"Chaco":[-26.3586,-60.4396],
  "Chubut":[-43.2933,-65.1095],"Córdoba":[-31.4135,-64.1811],
  "Corrientes":[-27.4692,-58.8306],"Entre Ríos":[-32.0588,-59.2044],
  "Formosa":[-26.1775,-58.1781],"Jujuy":[-24.1858,-65.2995],
  "La Pampa":[-36.6148,-64.284],"La Rioja":[-29.4131,-66.8561],
  "Mendoza":[-32.8895,-68.8458],"Misiones":[-27.4269,-55.9478],
  "Neuquén":[-38.9516,-68.0591],"Río Negro":[-40.8135,-63.0008],
  "Salta":[-24.7829,-65.4232],"San Juan":[-31.5375,-68.5364],
  "San Luis":[-33.3015,-66.3378],"Santa Cruz":[-51.6352,-69.2473],
  "Santa Fe":[-30.7069,-60.9498],"Santiago del Estero":[-27.7951,-64.2615],
  "Tierra del Fuego":[-54,-67],"Tucumán":[-26.8083,-65.2176],
  "Rosario":[-32.9472,-60.639],"La Plata":[-34.9206,-57.9545],
  "Mar del Plata":[-37.9977,-57.5556],"Bahía Blanca":[-38.7183,-62.2661],
  "San Miguel de Tucumán":[-26.8083,-65.2176],
  "Paraná":[-31.7313,-60.5238],"Posadas":[-27.3621,-55.8969],
  "Resistencia":[-27.4514,-59.0131],"Corrientes city":[-27.4692,-58.8306],
  "Rawson":[-43.3002,-65.1023],"Río Gallegos":[-51.6226,-69.2181],
  "Ushuaia":[-54.8019,-68.303],"Santa Rosa":[-36.6218,-64.2906],
  "Viedma":[-40.8135,-63.0008],"Comodoro Rivadavia":[-45.8654,-67.4976],
  "General Roca":[-39.0295,-67.5843],"Cipolletti":[-38.9347,-67.9943],
  "Quilmes":[-34.7206,-58.2544],"Lanús":[-34.7006,-58.3958],
  "Lomas de Zamora":[-34.7596,-58.4019],"Morón":[-34.6534,-58.6197],
  "San Isidro":[-34.4667,-58.5167],"Tigre":[-34.4258,-58.5798],
  "Avellaneda":[-34.6647,-58.3651],"San Martín":[-34.5705,-58.5358],
  "Merlo":[-34.665,-58.7284],"Moreno":[-34.6475,-58.792],
  "La Matanza":[-34.7706,-58.5987],"Tandil":[-37.3212,-59.1439],
  "San Salvador de Jujuy":[-24.1858,-65.2995],
  "Río Cuarto":[-33.1307,-64.3499],"Villa María":[-32.4072,-63.2422],
  "Oberá":[-27.4835,-55.1204],"Puerto Iguazú":[-25.5972,-54.5778],
  "Gualeguaychú":[-33.0125,-58.5204],"Tartagal":[-22.5167,-63.8],
  "Orán":[-23.1333,-64.3167]
};

const COLORS={"Nativo digital":"#4fc8a0","Medio tradicional":"#f07050","default":"#8899cc"};

function classifyMedio(m){
  if(!m)return"default";
  const l=m.toLowerCase();
  if(l.includes("nativo")||l.includes("digital")||l.includes("independiente"))return"Nativo digital";
  if(l.includes("tradicion")||l.includes("tv")||l.includes("radio")||l.includes("diario")||l.includes("canal")||l.includes("medio"))return"Medio tradicional";
  return m;
}
function getColor(m){const k=classifyMedio(m);return COLORS[k]||COLORS.default}
function fmtSubs(v){if(!v)return"—";const n=parseInt(v.toString().replace(/\D/g,""));if(isNaN(n))return v;if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1000)return(n/1000).toFixed(0)+"K";return n}
function getCoords(row){
  // Provincia siempre manda — la ciudad nunca sobreescribe la ubicación
  const p=(row["Provincia"]||"").trim();
  const base=COORDS[p]||null;
  if(!base)return null;
  return[base[0]+(Math.random()-.5)*.5,base[1]+(Math.random()-.5)*.5];
}

const map=L.map("map",{center:[-38.5,-64],zoom:4,minZoom:3,maxZoom:13});
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
const layer=L.layerGroup().addTo(map);

let allChannels=[],filters={prov:"",cat:"",search:"",medio:new Set()};

function createMarker(row){
  const coords=getCoords(row);if(!coords)return null;
  const color=getColor(row["Medio"]);
  const icon=L.divIcon({html:`<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5.5" fill="${color}" fill-opacity=".85" stroke="${color}" stroke-width="1.5"/><circle cx="7" cy="7" r="2" fill="white" fill-opacity=".9"/></svg>`,iconSize:[14,14],iconAnchor:[7,7],className:""});
  const mk=L.marker(coords,{icon});
  mk.bindPopup(`<div class="popup-title">${row["Nombre"]||"Sin nombre"}</div><div class="popup-sub">${row["Provincia"]||""}${row["Ciudad"]?" · "+row["Ciudad"]:""}</div><div class="popup-sub" style="margin-top:3px">${fmtSubs(row["Suscriptores"])} subs</div>`,{maxWidth:200});
  mk.on("click",()=>showDetail(row));
  return mk;
}

function applyFilters(){
  layer.clearLayers();let v=0,indet=[];
  allChannels.forEach(row=>{
    if(filters.prov&&row["Provincia"]!==filters.prov)return;
    if(filters.cat&&row["Categoría"]!==filters.cat)return;
    if(filters.search&&!(row["Nombre"]||"").toLowerCase().includes(filters.search.toLowerCase()))return;
    if(filters.medio.size>0){
      const k=classifyMedio(row["Medio"]);
      if(!filters.medio.has(k))return;
    }
    const prov=(row["Provincia"]||"").trim();
    if(!prov||!COORDS[prov]){indet.push(row);return;}
    const m=createMarker(row);if(m){m.addTo(layer);v++}
  });
  document.getElementById("st-vis").textContent=v;
  renderIndet(indet);
}

function renderIndet(rows){
  const wrap=document.getElementById("indet-list");
  const cnt=document.getElementById("indet-count");
  if(cnt)cnt.textContent=rows.length;
  if(!wrap)return;
  if(rows.length===0){wrap.innerHTML='<div style="font-family:var(--fm);font-size:10px;color:var(--muted);padding:8px 0">—</div>';return;}
  wrap.innerHTML=rows.map(r=>`
    <div class="indet-item" onclick='showDetail(${JSON.stringify(r).replace(/'/g,"&#39;")})'>
      <div class="cli-name">${r["Nombre"]||"Sin nombre"}</div>
      <div class="cli-sub">${r["Categoría"]||""}${r["Medio"]?" · "+r["Medio"]:""}</div>
    </div>`).join("");
}

function showDetail(row){
  document.getElementById("detail-ph").style.display="none";
  const card=document.getElementById("ch-card");card.style.display="block";
  const color=getColor(row["Medio"]);const medio=(row["Medio"]||"").trim()||"Sin clasificar";
  card.innerHTML=`
    <div class="ch-name">${row["Nombre"]||"Sin nombre"}</div>
    <div class="ch-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">${medio}</div>
    <div class="meta-list">
      <div class="meta-row"><span class="meta-key">Suscriptores</span><span class="meta-val">${fmtSubs(row["Suscriptores"])}</span></div>
      <div class="meta-row"><span class="meta-key">Provincia</span><span class="meta-val">${row["Provincia"]||"—"}</span></div>
      <div class="meta-row"><span class="meta-key">Ciudad</span><span class="meta-val">${row["Ciudad"]||"—"}</span></div>
      <div class="meta-row"><span class="meta-key">Categoría</span><span class="meta-val">${row["Categoría"]||"—"}</span></div>
      <div class="meta-row"><span class="meta-key">Estado</span><span class="meta-val">${row["Estado"]||"—"}</span></div>
      <div class="meta-row"><span class="meta-key">Actualizado</span><span class="meta-val" style="font-size:11px">${row["Fecha actualización"]||"—"}</span></div>
      ${row["ID"]?`<div class="meta-row"><span class="meta-key">YouTube</span><span class="meta-val"><a href="https://www.youtube.com/channel/${row["ID"]}" target="_blank" style="color:var(--accent);text-decoration:none;font-size:11px">Ver canal ↗</a></span></div>`:""}
    </div>
    ${row["Notas"]?`<div class="ch-notes">${row["Notas"]}</div>`:""}
  `;
}

function initWithData(results){
  allChannels=results.data;
  document.getElementById("loading").style.display="none";
  const provs=new Set(allChannels.map(r=>r["Provincia"]).filter(Boolean));
  document.getElementById("st-total").textContent=allChannels.length;
  document.getElementById("st-prov").textContent=provs.size;
  document.getElementById("st-nat").textContent=allChannels.filter(r=>classifyMedio(r["Medio"])==="Nativo digital").length;
  document.getElementById("header-meta").textContent=`${allChannels.length} canales · YouTube Argentina`;
  const selProv=document.getElementById("f-prov");
  [...provs].sort().forEach(p=>{const o=document.createElement("option");o.value=p;o.textContent=p;selProv.appendChild(o)});
  const cats=new Set(allChannels.map(r=>r["Categoría"]).filter(Boolean));
  const selCat=document.getElementById("f-cat");
  [...cats].sort().forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;selCat.appendChild(o)});
  // legend
  const medioMap={};
  allChannels.forEach(r=>{const k=classifyMedio(r["Medio"]);medioMap[k]=(medioMap[k]||0)+1});
  const legend=document.getElementById("legend");
  const order=["Nativo digital","Medio tradicional"];
  const keys=[...order.filter(k=>medioMap[k]),...Object.keys(medioMap).filter(k=>!order.includes(k))];
  keys.forEach(tipo=>{
    const color=COLORS[tipo]||COLORS.default;
    const el=document.createElement("div");el.className="legend-item";el.dataset.medio=tipo;
    el.innerHTML=`<div class="dot" style="background:${color}"></div><span class="lname">${tipo}</span><span class="count">${medioMap[tipo]}</span>`;
    el.addEventListener("click",()=>{
      if(filters.medio.has(tipo))filters.medio.delete(tipo);else filters.medio.add(tipo);
      document.querySelectorAll(".legend-item").forEach(l=>{
        l.classList.toggle("inactive",filters.medio.size>0&&!filters.medio.has(l.dataset.medio));
      });
      applyFilters();
    });
    legend.appendChild(el);
  });
  document.getElementById("f-prov").addEventListener("change",e=>{filters.prov=e.target.value;applyFilters()});
  document.getElementById("f-cat").addEventListener("change",e=>{filters.cat=e.target.value;applyFilters()});
  document.getElementById("f-search").addEventListener("input",e=>{filters.search=e.target.value;applyFilters()});
  document.getElementById("btn-reset").addEventListener("click",()=>{
    filters={prov:"",cat:"",search:"",medio:new Set()};
    document.getElementById("f-prov").value="";
    document.getElementById("f-cat").value="";
    document.getElementById("f-search").value="";
    document.querySelectorAll(".legend-item").forEach(l=>l.classList.remove("inactive"));
    applyFilters();
  });
  applyFilters();
}

function showFileLoader(){
  document.getElementById("ld-msg").innerHTML=`No se encontró <code>canales.csv</code> automáticamente.<br>Cargá el archivo manualmente para previsualizar:`;
  document.getElementById("loading").querySelector(".ld-bar").style.display="none";
  const drop=document.createElement("div");drop.id="file-drop";
  drop.innerHTML=`<label for="file-input">📂 <span>Seleccionar canales.csv</span><br><small style="opacity:.6;font-size:10px">En GitHub Pages el archivo se carga automáticamente</small></label><input type="file" id="file-input" accept=".csv">`;
  document.getElementById("loading").appendChild(drop);
  document.getElementById("file-input").addEventListener("change",e=>{
    const file=e.target.files[0];if(!file)return;
    Papa.parse(file,{header:true,skipEmptyLines:true,complete:initWithData});
  });
}

// Try fetch first (works on GitHub Pages), fall back to file input
fetch("canales.csv")
  .then(r=>{if(!r.ok)throw new Error("not found");return r.text()})
  .then(text=>Papa.parse(text,{header:true,skipEmptyLines:true,complete:initWithData}))
  .catch(()=>showFileLoader());
</script>
</body>
</html>
